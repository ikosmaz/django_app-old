{% extends "base_menu.html" %}
{% block content %}
<div class="panel panel-default" style="max-width:560px; margin:20px auto;">
  <div class="panel-heading">
    <h3 class="panel-title">Delete message</h3>
  </div>
  <div class="panel-body">
    <p style="font-weight:700;">Delete?</p>
    <form method="post" action="">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ cancel_url }}">
      <button type="submit" class="btn btn-danger">Yes</button>
      <a href="{{ cancel_url }}" class="btn btn-default">No</a>
    </form>
  </div>
</div>
{% endblock %}
