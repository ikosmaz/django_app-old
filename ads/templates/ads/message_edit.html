{% extends "base_menu.html" %}
{% block content %}
<div class="panel panel-default" style="max-width:680px; margin:20px auto;">
  <div class="panel-heading">
    <h3 class="panel-title">Edit message</h3>
  </div>
  <div class="panel-body">
    <p style="color:#666;">Ad: <strong>{{ message_obj.ad.title|capfirst }}</strong></p>
    <form method="post" action="">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ cancel_url }}">
      <div class="form-group">
        {{ form.encrypted_text }}
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ cancel_url }}" class="btn btn-default">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
