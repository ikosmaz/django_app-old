{% extends "base_menu.html" %}

{% block content %}
<h2>Set a new password</h2>

{% if validlink %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Update password</button>
  </form>
{% else %}
  <p>The reset link is invalid or expired. Request a new one.</p>
  <a class="btn btn-default" href="{% url 'password_reset' %}">Request new link</a>
{% endif %}
{% endblock %}
