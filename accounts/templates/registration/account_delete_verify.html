{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Deletion - {{ settings.APP_NAME }}</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'login-neu/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Confirm account deletion</h2>
                <p>This action is permanent and cannot be undone.</p>
                <p>Click the button below to delete your account.</p>
            </div>
            <form method="post" action="">
                {% csrf_token %}
                {% if signed_token %}
                <input type="hidden" name="token" value="{{ signed_token }}">
                {% endif %}
                <div class="signup-row">
                    <div class="signup-card clickable" onclick="this.closest('form').submit();">
                        <p>Delete <b>My Account</b></p>
                    </div>
                    <div class="signup-card clickable" onclick="window.location='{% url 'ads:all' %}'">
                        <p>Cancel and go <b>Home</b></p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
