{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Activated - {{ settings.APP_NAME }}</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'login-neu/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                {% if already_active %}
                <h2>Account already active</h2>
                <p>Your email was already confirmed. You can sign in now.</p>
                {% else %}
                <h2>Email confirmed</h2>
                <p>Your account is now active. You can sign in now.</p>
                {% endif %}
            </div>
            <div class="signup-row">
                <div class="signup-card clickable" onclick="window.location='{% url 'login' %}'">
                    <p>Go to <b>Sign in</b></p>
                </div>
                <div class="signup-card clickable" onclick="window.location='{% url 'ads:all' %}'">
                    <p>Back to <b>Home page</b></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
