{% extends "base_menu.html" %}
{% load app_tags %}
{% block content %}
<div class="panel panel-default" style="max-width:560px; margin:20px auto;">
  <div class="panel-heading">
    <h3 class="panel-title">Edit account</h3>
  </div>
  <div class="panel-body">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
      <img src="{{ user|avatar_url:120 }}" alt="{{ user.username }}"
           style="width:72px; height:72px; border-radius:50%; object-fit:cover; border:1px solid #d9d9d9;">
      <div>
        <div><b>{{ user.username }}</b></div>
        <div style="color:#666;">{{ user.email }}</div>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <a class="btn btn-primary" href="{% url 'ads:avatar_change' %}">
        <i class="fa fa-camera"></i> Change avatar
      </a>
    </div>

    <hr>

    <h4 style="margin-top:0; color:#800020;">Delete account</h4>
    <p style="color:#666;">
      Deleting your account will also delete all ads you own and related data.
      This action cannot be undone.
    </p>
    <a class="btn btn-danger" href="{% url 'ads:account_delete' %}">
      <i class="fa fa-trash"></i> Delete account
    </a>
    <a href="{% url 'ads:all' %}" class="btn btn-default">Cancel</a>
  </div>
</div>
{% endblock %}
