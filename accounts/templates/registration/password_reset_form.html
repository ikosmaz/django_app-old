{% extends "base_menu.html" %}

{% block content %}
<h2>Password reset</h2>
<p>Enter your account email, and we will send you a password reset link.</p>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Send reset link</button>
</form>
{% endblock %}
